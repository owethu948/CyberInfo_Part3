name: .NET Desktop

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build the project
      run: dotnet build --no-restore --configuration Release

    - name: Publish (self-contained for win-x64)
      run: dotnet publish --no-build --configuration Release --output ./publish --self-contained true --runtime win-x64

    - name: Upload published artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CyberInfo
        path: ./publish
